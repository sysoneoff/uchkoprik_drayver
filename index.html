<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Uchko'prik tumani — Driver</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<meta name="description" content="Uchko'prik tumani 51 MFY interaktiv xaritasi — SysOne Digital Solutions">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
// Tema FOUC'siz qo'llanishi uchun CSS'dan oldin ishlaydi
(function(){
  try{ var th = localStorage.getItem('sysone-uchkoprik-theme-v1') || 'dark'; document.documentElement.setAttribute('data-theme', th); }catch(e){}
})();
</script>
<style>
:root{
  --bg-0:#0A0E1A;
  --bg-1:#0F1426;
  --bg-2:#141B33;
  --glass:rgba(255,255,255,.06);
  --glass-strong:rgba(255,255,255,.10);
  --glass-border:rgba(255,255,255,.14);
  --text:#F1F3F9;
  --text-dim:#8B93AB;
  --text-faint:#5B637C;
  --accent-a:#6366F1;
  --accent-b:#06B6D4;
  --accent-grad:linear-gradient(135deg,#6366F1 0%,#06B6D4 100%);
  --danger:#F87171;
  --ok:#34D399;
  --warn:#FBBF24;
  --r-xl:28px;
  --r-lg:20px;
  --r-md:14px;
  --r-sm:10px;
  --r-full:999px;
  --shadow-float:0 20px 60px -15px rgba(0,0,0,.55), 0 4px 16px rgba(0,0,0,.3);
  --shadow-soft:0 8px 24px rgba(0,0,0,.28);
  --map-tiles:1;
}
html[data-theme="light"]{
  --bg-0:#EEF0F6;
  --bg-1:#F4F5FA;
  --bg-2:#E7E9F3;
  --glass:rgba(255,255,255,.55);
  --glass-strong:rgba(255,255,255,.78);
  --glass-border:rgba(20,24,46,.10);
  --text:#191D2B;
  --text-dim:#5B6178;
  --text-faint:#8C92A8;
  --shadow-float:0 20px 50px -15px rgba(30,35,70,.22), 0 4px 14px rgba(30,35,70,.10);
  --shadow-soft:0 8px 20px rgba(30,35,70,.10);
  --map-tiles:1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text);
  background:var(--bg-0);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .3s ease, color .3s ease;
}
h1,h2,h3,.display{font-family:'Outfit',system-ui,sans-serif;}
::selection{background:rgba(99,102,241,.4);}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:rgba(127,127,127,.25);border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ---------- Background ambience ---------- */
#bg{
  position:fixed; inset:0; z-index:0; overflow:hidden;
  background:
    radial-gradient(ellipse 900px 700px at 12% -8%, rgba(99,102,241,.22), transparent 60%),
    radial-gradient(ellipse 800px 700px at 110% 18%, rgba(6,182,212,.16), transparent 60%),
    radial-gradient(ellipse 900px 800px at 50% 120%, rgba(168,85,247,.14), transparent 60%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1) 50%,var(--bg-2));
  transition:background .3s ease;
}
html[data-theme="light"] #bg{
  background:
    radial-gradient(ellipse 900px 700px at 12% -8%, rgba(99,102,241,.14), transparent 60%),
    radial-gradient(ellipse 800px 700px at 110% 18%, rgba(6,182,212,.10), transparent 60%),
    radial-gradient(ellipse 900px 800px at 50% 120%, rgba(168,85,247,.09), transparent 60%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1) 50%,var(--bg-2));
}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;animation:drift 22s ease-in-out infinite;}
html[data-theme="light"] .orb{opacity:.22;}
.orb1{width:420px;height:420px;background:#6366F1;top:-120px;left:-100px;animation-delay:0s;}
.orb2{width:380px;height:380px;background:#06B6D4;bottom:-140px;right:-80px;animation-delay:-7s;}
.orb3{width:300px;height:300px;background:#A855F7;top:40%;left:60%;animation-delay:-14s;}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(30px,-30px) scale(1.08);}
}

/* ---------- Glass base ---------- */
.glass{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-soft);
  transition:background .3s ease, border-color .3s ease;
}
.glass-strong{
  background:var(--glass-strong);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid var(--glass-border);
  transition:background .3s ease, border-color .3s ease;
}

/* ---------- Brand mark (logo placeholder) ---------- */
.brand-mark{display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.brand-mark.fallback{background:var(--accent-grad);font-family:'Outfit';font-weight:800;color:#fff;}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block;}

/* ---------- Loading screen ---------- */
#loading{
  position:fixed; inset:0; z-index:300;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:linear-gradient(180deg,var(--bg-0),var(--bg-2));
  transition:opacity .6s ease, visibility .6s ease, background .3s ease;
}
#loading.hide{opacity:0; visibility:hidden; pointer-events:none;}
.loading-mark{
  width:84px;height:84px;border-radius:26px;
  font-size:30px;letter-spacing:-1px;
  box-shadow:0 0 60px rgba(99,102,241,.35), 0 20px 50px rgba(0,0,0,.25);
  animation:pulseMark 1.8s ease-in-out infinite;
  position:relative;
}
.loading-mark::after{
  content:'';position:absolute;inset:-10px;border-radius:32px;
  border:1.5px solid rgba(99,102,241,.35);
  animation:ring 1.8s ease-out infinite;
}
@keyframes pulseMark{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes ring{0%{transform:scale(.9);opacity:.8;}100%{transform:scale(1.5);opacity:0;}}
.loading-word{margin-top:22px;font-family:'Outfit';font-weight:700;font-size:21px;letter-spacing:6px;color:var(--text);}
.loading-word span{opacity:0;animation:letterIn .5s ease forwards;}
.loading-sub{margin-top:8px;font-size:12.5px;color:var(--text-dim);letter-spacing:1px;}
@keyframes letterIn{to{opacity:1;}}
.loading-bar{margin-top:26px;width:160px;height:3px;border-radius:99px;background:rgba(127,127,127,.18);overflow:hidden;}
.loading-bar i{display:block;height:100%;width:40%;background:var(--accent-grad);border-radius:99px;animation:bar 1.1s ease-in-out infinite;}
@keyframes bar{0%{transform:translateX(-100%);}100%{transform:translateX(350%);}}

/* ---------- App shell ---------- */
#app{position:fixed;inset:0;z-index:1;visibility:hidden;}
#app.ready{visibility:visible;}

#map-wrap{position:absolute;inset:0;}
#map{position:absolute;inset:0;background:#11162A;filter:brightness(var(--map-tiles));}
#map{transition:filter .45s ease, transform .45s ease;}

/* Leaflet tweaks */
.leaflet-control-zoom{border:none !important;}
.leaflet-top.leaflet-right{top:74px;right:16px;}
.leaflet-control-zoom a{
  background:var(--glass-strong) !important;backdrop-filter:blur(14px);
  color:var(--text) !important;border:1px solid var(--glass-border) !important;
}
.leaflet-control-zoom a:first-child{border-radius:var(--r-md) var(--r-md) 0 0 !important;}
.leaflet-control-zoom a:last-child{border-radius:0 0 var(--r-md) var(--r-md) !important;}
@media (max-width:760px){.leaflet-top.leaflet-right{top:70px;right:14px;}}
.leaflet-control-attribution{
  background:var(--glass) !important;color:var(--text-faint) !important;
  backdrop-filter:blur(10px);border-radius:var(--r-sm) 0 0 0 !important;font-size:10px !important;
}
.leaflet-control-attribution a{color:var(--text-dim) !important;}
.leaflet-popup,.leaflet-tooltip{display:none !important;}

.mfy-pin{display:flex;align-items:center;justify-content:center;}
.mfy-pin .dot{
  width:16px;height:16px;border-radius:50%;border:2.5px solid rgba(10,14,26,.9);
  box-shadow:0 2px 10px rgba(0,0,0,.45);transition:transform .15s ease;
}
html[data-theme="light"] .mfy-pin .dot{border-color:rgba(255,255,255,.95);}
.mfy-pin.active .dot{transform:scale(1.45);box-shadow:0 0 0 6px rgba(99,102,241,.18),0 2px 14px rgba(0,0,0,.5);}
.mfy-pin:hover .dot{transform:scale(1.25);}
.marker-cluster-sysone{background:transparent;}
.marker-cluster-sysone div{
  width:40px;height:40px;border-radius:50%;
  background:var(--glass-strong);backdrop-filter:blur(10px);
  border:1.5px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text);font-family:'Outfit';font-weight:700;font-size:13px;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}
/* Qidiruv mosligini xaritada ajratib ko'rsatish (pulsatsiya halqasi) */
.search-pulse-wrap{position:relative;width:1px;height:1px;}
.search-pulse-ring{
  position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px 0 0 -17px;
  border-radius:50%;border:2.5px solid var(--accent-a);
  animation:searchPulse 1.4s ease-out infinite;
}
@keyframes searchPulse{0%{transform:scale(.45);opacity:.9;}100%{transform:scale(1.9);opacity:0;}}

/* ---------- Top bar ---------- */
#topbar{
  position:absolute;top:16px;left:16px;right:16px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  pointer-events:none;
}
#topbar > *{pointer-events:auto;}
.icon-btn{
  width:46px;height:46px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1px solid var(--glass-border);color:var(--text);flex-shrink:0;
  transition:.15s ease;
}
.icon-btn:hover{background:var(--glass-strong);transform:translateY(-1px);}
.icon-btn svg{width:20px;height:20px;}
#title-pill{
  padding:11px 24px;border-radius:var(--r-full);
  display:flex;flex-direction:column;align-items:center;
  position:absolute;left:50%;top:16px;transform:translateX(-50%);
  pointer-events:auto;
}
#title-pill h1{margin:0;font-size:14px;font-weight:700;letter-spacing:2.5px;white-space:nowrap;}
#title-pill span{font-size:9.5px;color:var(--text-dim);letter-spacing:1.5px;margin-top:1px;}
#visit-pill{
  padding:0 16px;height:46px;border-radius:var(--r-full);display:flex;align-items:center;gap:8px;
  font-size:12.5px;color:var(--text-dim);font-weight:600;white-space:nowrap;
}
#visit-pill b{color:var(--text);font-weight:700;font-family:'Outfit';}
#visit-pill svg{width:15px;height:15px;flex-shrink:0;}

@media (max-width:760px){
  #title-pill{display:none;}
  #topbar{top:14px;left:14px;right:14px;}
  #visit-pill{padding:0 13px;height:42px;font-size:11.5px;}
  .icon-btn{width:42px;height:42px;}
}

/* ---------- Side menu (drawer) ---------- */
#scrim{
  position:fixed;inset:0;background:rgba(5,7,14,.45);backdrop-filter:blur(2px);
  z-index:50;opacity:0;visibility:hidden;transition:.3s ease;
}
#scrim.show{opacity:1;visibility:visible;}
#side-menu{
  position:fixed;top:0;left:0;bottom:0;width:280px;max-width:84vw;z-index:60;
  border-radius:0 var(--r-xl) var(--r-xl) 0;border-left:none;
  transform:translateX(-104%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;padding:22px 18px;
}
#side-menu.open{transform:translateX(0);}
.menu-head{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--glass-border);margin-bottom:14px;}
.menu-mark{width:42px;height:42px;border-radius:13px;font-size:16px;}
.menu-head div h2{margin:0;font-size:15.5px;}
.menu-head div span{font-size:11px;color:var(--text-dim);}
.menu-item{
  display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--r-md);cursor:pointer;
  color:var(--text-dim);font-size:14px;font-weight:600;transition:.15s ease;margin-bottom:4px;
}
.menu-item svg{width:19px;height:19px;flex-shrink:0;opacity:.85;}
.menu-item:hover{background:var(--glass-strong);color:var(--text);}
.menu-sep{height:1px;background:var(--glass-border);margin:10px 2px;}
.menu-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--glass-border);}
.menu-foot-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-faint);}
.menu-foot-row b{color:var(--text-dim);}
.menu-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:700;padding:0 14px;margin-bottom:8px;}
.lang-row,.theme-row{display:flex;gap:6px;padding:0 14px 14px;}
.lang-btn,.theme-btn{
  flex:1;padding:8px 0;border-radius:var(--r-sm);text-align:center;font-size:12px;font-weight:700;
  border:1px solid var(--glass-border);color:var(--text-dim);cursor:pointer;transition:.15s ease;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.theme-btn svg{width:14px;height:14px;}
.lang-btn:hover,.theme-btn:hover{color:var(--text);}
.lang-btn.active,.theme-btn.active{background:var(--accent-grad);color:#fff;border-color:transparent;}

/* ---------- Toolbar (MFY tanlash + filters) ---------- */
#toolbar{
  position:absolute;left:16px;bottom:16px;z-index:35;
  width:380px;max-width:calc(100vw - 32px);
  padding:14px;display:flex;flex-direction:column;gap:11px;
  transition:transform .3s ease, opacity .3s ease;
}
#toolbar.collapsed{transform:translateY(calc(100% + 16px));opacity:0;pointer-events:none;}
.tb-row{display:flex;gap:8px;align-items:center;}
/* MFY tanlash — kengayadigan ro'yxat */
#mfy-select-head{
  flex:1;display:flex;align-items:center;gap:10px;
  background:rgba(127,127,127,.08);border:1px solid var(--glass-border);color:var(--text);
  border-radius:var(--r-full);padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
  transition:.15s ease;user-select:none;
}
#mfy-select-head:hover{background:var(--glass-strong);}
#mfy-select-head svg.pin-ic{width:16px;height:16px;color:var(--accent-b);flex-shrink:0;}
#mfy-select-head .msh-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#mfy-select-head .msh-label .chosen{color:var(--accent-b);}
#mfy-select-head svg.chev{width:15px;height:15px;color:var(--text-dim);flex-shrink:0;transition:transform .25s ease;}
#mfy-select-head.open svg.chev{transform:rotate(180deg);}
#mfy-select-list{
  display:flex;flex-direction:column;gap:2px;overflow-y:auto;
  max-height:0;opacity:0;transition:max-height .3s ease, opacity .22s ease;
  padding-right:2px;
}
#mfy-select-list.open{max-height:236px;opacity:1;}
.mfy-opt{
  display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r-sm);
  font-size:12.5px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:.12s ease;flex-shrink:0;
}
.mfy-opt:hover{background:var(--glass-strong);color:var(--text);}
.mfy-opt.active{background:rgba(99,102,241,.16);color:var(--text);border:1px solid rgba(99,102,241,.35);padding:7px 10px;}
.mfy-opt .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mfy-opt .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mfy-opt .sp{font-size:10px;color:var(--text-faint);flex-shrink:0;}
#filters-toggle{
  width:38px;height:38px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(127,127,127,.08);border:1px solid var(--glass-border);color:var(--text-dim);cursor:pointer;transition:.15s ease;
}
#filters-toggle:hover{color:var(--text);background:var(--glass-strong);}
#filters-toggle svg{transition:transform .25s ease;}
#filters-toggle.open svg{transform:rotate(180deg);}
#filters-body{display:flex;flex-direction:column;gap:9px;overflow:hidden;max-height:260px;transition:max-height .28s ease, opacity .22s ease, margin .28s ease;opacity:1;}
#filters-body.hide{max-height:0;opacity:0;}
.chip-scroll{display:flex;gap:6px;}
.chip-scroll.scroll-x{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.chip-scroll.scroll-x::-webkit-scrollbar{display:none;}
.chip-scroll.scroll-y{flex-direction:column;max-height:190px;overflow-y:auto;padding-right:2px;}
.chip-scroll.scroll-y .f-chip{width:100%;justify-content:flex-start;}
.f-chip{
  flex-shrink:0;padding:6px 12px;border-radius:var(--r-full);font-size:11px;font-weight:600;
  border:1px solid var(--glass-border);color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:.15s ease;
  display:flex;align-items:center;gap:5px;
}
.f-chip:hover{color:var(--text);}
.f-chip.active{background:var(--accent-grad);color:#fff;border-color:transparent;}
.f-chip .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#tb-toggle{
  position:absolute;left:16px;bottom:16px;z-index:34;width:46px;height:46px;display:none;
  align-items:center;justify-content:center;cursor:pointer;
}
#result-count{font-size:11px;color:var(--text-faint);padding:0 4px;}

@media (max-width:760px){
  #toolbar{left:14px;right:14px;bottom:14px;width:auto;max-width:none;}
}

/* ---------- Detail card — burchakdan ajralgan, minimalistik suzuvchi panel ---------- */
#detail-scrim{
  position:fixed;inset:0;z-index:69;background:transparent;opacity:0;visibility:hidden;
}
#detail-scrim.show{opacity:1;visibility:visible;}
/* Belgi → panel konnektor chizig'i */
#connector-svg{
  position:fixed;inset:0;z-index:68;pointer-events:none;
  opacity:0;transition:opacity .35s ease .12s;
}
#connector-svg.show{opacity:1;}
#connector-svg .conn-line{fill:none;stroke-width:2;stroke-linecap:round;}
#connector-svg .conn-dot{stroke:none;}
#connector-svg .conn-end{fill:none;stroke-width:2;}
#detail-card{
  position:fixed;top:50%;right:26px;width:340px;max-width:calc(100vw - 52px);z-index:70;
  max-height:min(78vh, 640px);
  border-radius:var(--r-xl);
  border:1.5px solid var(--dc-accent, var(--glass-border));
  transform:translate(24px,-50%) scale(.95);opacity:0;
  transition:transform .42s cubic-bezier(.19,1,.22,1), opacity .3s ease, border-color .3s ease, box-shadow .3s ease;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 70px -12px rgba(0,0,0,.5), 0 0 0 5px var(--dc-glow, transparent), 0 0 42px -6px var(--dc-glow, transparent);
}
#detail-card.show{transform:translate(0,-50%) scale(1);opacity:1;}
.dc-cover{position:relative;height:150px;flex-shrink:0;background:linear-gradient(135deg,#1c2342,#101529);overflow:hidden;}
html[data-theme="light"] .dc-cover{background:linear-gradient(135deg,#dfe2f2,#eef0fa);}
.dc-cover img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;}
.dc-cover .ph-nav{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(10,14,26,.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;}
.dc-cover .ph-prev{left:10px;}.dc-cover .ph-next{right:10px;}
.dc-cover .ph-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px;}
.dc-cover .ph-dots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);}
.dc-cover .ph-dots i.on{background:#fff;width:14px;border-radius:99px;}
.dc-cover .ph-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text-faint);}
.dc-cover .ph-empty svg{width:30px;height:30px;opacity:.5;}
.dc-cover .ph-empty span{font-size:11px;}
.dc-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(10,14,26,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:5;}
.dc-spec-badge{position:absolute;top:14px;left:14px;padding:6px 13px;border-radius:var(--r-full);font-size:11px;font-weight:700;color:#fff;backdrop-filter:blur(8px);z-index:5;}

function mergeOverrides(overridesById){
  DATA = BASE_MFY.map(b => overridesById[b.id] ? Object.assign({photos:[],status:'partial'}, b, overridesById[b.id]) : Object.assign({photos:[],status:'partial'}, b));
  DATA.forEach(d => { if(!d.status) d.status = (d.photos && d.photos.length) ? 'full' : 'partial'; });
}
function onDataChanged(){
  // 1. Aholini hisoblashni ENG TEPAGA qo'yamiz (xarita yuklanishini kutmasligi uchun)
  const totalPop = DATA.reduce((sum, m) => sum + (Number(m.population) || 0), 0);
  const popBadge = document.getElementById('total-pop-badge');
  if(popBadge) popBadge.textContent = "👥 " + totalPop.toLocaleString('ru-RU');

  // 2. Qolgan ishlar xarita tayyor bo'lgach bajariladi
  if(!map) return;
  DATA.forEach(m => refreshMarker(m.id));
  buildMfyList(); updateMfyLabel();
  applyFilters();
  if(activeId) renderDetail();
}
function loadData(cb){
  if(FIREBASE_ENABLED){
    db.collection('mfy').onSnapshot(snap => {
      const overridesById = {};
      snap.forEach(doc => { overridesById[Number(doc.id)] = doc.data(); });
      mergeOverrides(overridesById);
      onDataChanged();
      if(cb){ cb(); cb = null; }
    }, err => {
      console.error('Firestore xato:', err);
      mergeOverrides({}); if(cb){ cb(); cb=null; }
    });
  } else {
    mergeOverrides({});
    if(cb) cb();
  }
}

async function bumpVisits(){
  if(!FIREBASE_ENABLED){ document.getElementById('visit-count').textContent = '—'; return; }
  const ref = db.collection('stats').doc('visits');
  ref.onSnapshot(doc => {
    document.getElementById('visit-count').textContent = doc.exists ? (doc.data().count||0) : 0;
  });
  if(!sessionStorage.getItem('counted')){
    sessionStorage.setItem('counted','1');
    try{ await ref.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge:true }); }catch(e){}
  }
}

// ---------------------------------------------------------------
// Tema bo'yicha xarita plitalari:
// - Tun: CARTO dark_all (qorong'u fon + barcha joy nomlari yozuvlari bilan)
// - Kun: OpenStreetMap standart (eng batafsil — MFY, shaharcha, qishloq, ko'cha nomlari)
let tileLayer = null;
const TILE_SETS = {
  dark: {
    url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    attribution:'&copy; OpenStreetMap &copy; CARTO'
  },
  light: {
    url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    attribution:'&copy; OpenStreetMap contributors'
  }
};
function applyMapTiles(){
  if(!map) return;
  const set = TILE_SETS[currentTheme] || TILE_SETS.dark;
  if(tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(set.url, { maxZoom:19, attribution:set.attribution }).addTo(map);
  tileLayer.bringToBack();
}
function initMap(){
  map = L.map('map', { zoomControl:false, attributionControl:true, minZoom:9, maxZoom:18 })
    .setView([40.555, 71.02], 11.3);
  applyMapTiles();

  L.control.zoom({ position:'topright' }).addTo(map);

  cluster = L.markerClusterGroup({
    iconCreateFunction: c => L.divIcon({ html:`<div>${c.getChildCount()}</div>`, className:'marker-cluster-sysone', iconSize:[40,40] }),
    maxClusterRadius:50, spiderfyOnMaxZoom:true, showCoverageOnHover:false
  });
  searchHighlightLayer = L.layerGroup().addTo(map);

  DATA.forEach(m => {
    const color = SPEC_COLORS[m.specialization] || '#7C8798';
    const icon = L.divIcon({
      className:'mfy-pin', iconSize:[22,22], iconAnchor:[11,11],
      html:`<div class="dot" style="background:${color}"></div>`
    });
    const mk = L.marker([m.lat, m.lng], { icon });
    mk.on('click', () => openDetail(m.id));
    markers[m.id] = mk;
    cluster.addLayer(mk);

    const halo = L.circle([m.lat, m.lng], {
      radius: 380, color, weight:0, fillColor:color, fillOpacity:.05
    });
    regionLayers[m.id] = halo;
    halo.addTo(map);
  });
  map.addLayer(cluster);

  // Konnektor chizig'ini xarita harakati bilan jonli yangilash
  map.on('move zoom viewreset', () => { if(activeId) drawConnector(); });
}
function refreshMarker(id){
  const m = DATA.find(x=>x.id===id); if(!m) return;
  const color = SPEC_COLORS[m.specialization] || '#7C8798';
  const icon = L.divIcon({ className:'mfy-pin', iconSize:[22,22], iconAnchor:[11,11], html:`<div class="dot" style="background:${color}"></div>` });
  markers[id].setIcon(icon);
  regionLayers[id].setStyle({ color, fillColor:color });
}

let selectedMfyId = null;

function updateMfyLabel(){
  const lab = document.getElementById('mfy-select-label');
  if(selectedMfyId){
    const m = DATA.find(x=>x.id===selectedMfyId);
    lab.innerHTML = m ? `<span class="chosen">${escapeHtml(fullName(m))}</span>` : t('mfySelectPlaceholder');
  } else {
    lab.textContent = t('mfySelectPlaceholder');
  }
}
function buildMfyList(){
  const wrap = document.getElementById('mfy-select-list');
  const sorted = [...DATA].sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  wrap.innerHTML = sorted.map(m => {
    const color = SPEC_COLORS[m.specialization] || '#7C8798';
    return `<div class="mfy-opt${selectedMfyId===m.id?' active':''}" data-id="${m.id}">
      <span class="sw" style="background:${color}"></span>
      <span class="nm">${escapeHtml(fullName(m))}</span>
      <span class="sp">${escapeHtml(specLabel(m.specialization))}</span>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.mfy-opt').forEach(el => el.addEventListener('click', () => {
    selectMfy(Number(el.dataset.id));
  }));
}
function selectMfy(id){
  const m = DATA.find(x=>x.id===id); if(!m) return;
  selectedMfyId = id;
  updateMfyLabel();
  document.getElementById('mfy-select-list').querySelectorAll('.mfy-opt').forEach(el =>
    el.classList.toggle('active', Number(el.dataset.id)===id));
  // Xaritada fokus: uchib borish + pulsatsiya halqasi
  searchHighlightLayer.clearLayers();
  const color = SPEC_COLORS[m.specialization] || '#6366F1';
  const pulseIcon = L.divIcon({
    className:'search-pulse-wrap', iconSize:[1,1], iconAnchor:[0,0],
    html:`<div class="search-pulse-ring" style="border-color:${color}"></div>`
  });
  L.marker([m.lat, m.lng], { icon: pulseIcon, interactive:false }).addTo(searchHighlightLayer);
  map.flyTo([m.lat, m.lng], 15, { duration:.7 });
  // Fokusdan so'ng ma'lumot kartasini ochamiz
  setTimeout(() => { if(selectedMfyId===id) openDetail(id); }, 780);
  // Mobil ekranda ro'yxatni yopamiz
  if(window.innerWidth <= 760){
    document.getElementById('mfy-select-list').classList.remove('open');
    document.getElementById('mfy-select-head').classList.remove('open');
  }
}
document.getElementById('mfy-select-head').addEventListener('click', () => {
  document.getElementById('mfy-select-list').classList.toggle('open');
  document.getElementById('mfy-select-head').classList.toggle('open');
});

function buildSpecChips(){
  const wrap = document.getElementById('spec-chips');
  wrap.innerHTML = `<div class="f-chip${filters.spec===''?' active':''}" data-spec="">${t('specAll')}</div>` +
    Object.keys(SPEC_COLORS).map(s => `<div class="f-chip${filters.spec===s?' active':''}" data-spec="${escapeHtml(s)}"><span class="sw" style="background:${SPEC_COLORS[s]}"></span>${escapeHtml(specLabel(s))}</div>`).join('');
  wrap.querySelectorAll('.f-chip').forEach(ch => ch.addEventListener('click', () => {
    wrap.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));
    ch.classList.add('active');

  }));

function buildStatusChips(){
  const wrap = document.getElementById('status-chips');
  wrap.innerHTML = `
    <div class="f-chip${filters.status===''?' active':''}" data-status="">${t('statusAll')}</div>
    <div class="f-chip${filters.status==='full'?' active':''}" data-status="full">${t('statusFull')}</div>
    <div class="f-chip${filters.status==='partial'?' active':''}" data-status="partial">${t('statusPartial')}</div>
  `;
  wrap.querySelectorAll('.f-chip').forEach(ch => ch.addEventListener('click', () => {
    wrap.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));
    ch.classList.add('active');
    filters.status = ch.dataset.status;
    applyFilters();
  }));
}
function buildRegionLegend(){
  document.getElementById('region-legend').innerHTML = `<h4>${t('regionLegendTitle')}</h4>` +
    Object.keys(SPEC_COLORS).map(s=>`<div class="rl-item"><i style="background:${SPEC_COLORS[s]}"></i>${escapeHtml(specLabel(s))}</div>`).join('');
}
function applyFilters(){
  let shown = 0;
  DATA.forEach(m => {
    let ok = true;
    if(filters.spec && m.specialization !== filters.spec) ok = false;
    if(filters.status && m.status !== filters.status) ok = false;
    const layer = markers[m.id];
    if(ok){
      if(!cluster.hasLayer(layer)) cluster.addLayer(layer);
      regionLayers[m.id].setStyle({opacity: filters.spec?1:0, fillOpacity:filters.spec?.14:.05});
      shown++;
    } else { if(cluster.hasLayer(layer)) cluster.removeLayer(layer); }
  });
  document.getElementById('result-count').textContent = (I18N[currentLang].resultCount || I18N.uz.resultCount)(shown, DATA.length);
}

function openDetail(id){

// 9a. KONNEKTOR CHIZIG'I — tanlangan nuqtadan ma'lumot paneligacha
// silliq egri chiziq; xarita surilganda/zoom bo'lganda jonli yangilanadi
// ---------------------------------------------------------------
function drawConnector(){
  const svg = document.getElementById('connector-svg');
  if(!activeId || !map){ svg.innerHTML=''; return; }
  const m = DATA.find(x=>x.id===activeId); if(!m){ svg.innerHTML=''; return; }
  const color = SPEC_COLORS[m.specialization] || '#6366F1';

  // Nuqtaning ekran koordinatasi (xarita butun ekranni egallaydi)
  const mapRect = document.getElementById('map').getBoundingClientRect();
  const pt = map.latLngToContainerPoint([m.lat, m.lng]);
  const x1 = mapRect.left + pt.x, y1 = mapRect.top + pt.y;

  // Panel chekkasidagi ulanish nuqtasi
  const card = document.getElementById('detail-card').getBoundingClientRect();
  let x2, y2;
  const mobile = window.innerWidth <= 760;
  if(mobile){
    // panel pastda — yuqori qirra markaziga ulaymiz
    x2 = card.left + card.width/2; y2 = card.top - 2;
  } else {
    // panel o'ngda — chap qirra o'rtasiga ulaymiz
    x2 = card.left - 2; y2 = Math.min(Math.max(y1, card.top + 26), card.bottom - 26);
  }

  // Belgi kadr ortida (panel ostida) qolsa chizmaymiz
  const covered = x1 >= card.left && x1 <= card.right && y1 >= card.top && y1 <= card.bottom;
  if(covered || x1 < -20 || y1 < -20 || x1 > innerWidth+20 || y1 > innerHeight+20){
    svg.innerHTML=''; return;
  }

  svg.setAttribute('viewBox', `0 0 ${innerWidth} ${innerHeight}`);
  svg.setAttribute('width', innerWidth); svg.setAttribute('height', innerHeight);

  // Silliq kvadratik egri
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const cx = mobile ? mx : mx, cy = mobile ? Math.min(y1,y2) - 24 : my - 34;
  const d = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;

  svg.innerHTML = `
    <path class="conn-line" d="${d}" stroke="${color}" stroke-dasharray="6 5" opacity=".9"/>
    <circle class="conn-dot" cx="${x1}" cy="${y1}" r="4.5" fill="${color}"/>
    <circle class="conn-end" cx="${x1}" cy="${y1}" r="9" stroke="${color}" opacity=".45"/>
    <circle class="conn-dot" cx="${x2}" cy="${y2}" r="4" fill="${color}"/>
  `;
}
window.addEventListener('resize', () => { if(activeId) drawConnector(); });

function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

document.getElementById('about-modal').addEventListener('click', e => { if(e.target.id==='about-modal') e.target.classList.remove('show'); });

// ---------------------------------------------------------------
// 14. TOOLBAR TOGGLE (mobil)
// ---------------------------------------------------------------
document.getElementById('tb-toggle').addEventListener('click', () => document.getElementById('toolbar').classList.toggle('collapsed'));
function setupResponsiveToolbar(){
  if(window.innerWidth <= 760){
    document.getElementById('toolbar').classList.add('collapsed');
    document.getElementById('tb-toggle').style.display = 'flex';
  } else {
    document.getElementById('tb-toggle').style.display = 'none';
    document.getElementById('toolbar').classList.remove('collapsed');
  }
}
window.addEventListener('resize', setupResponsiveToolbar);

// ---------------------------------------------------------------
// 15. LOADING SCREEN
// ---------------------------------------------------------------
function animateLoadingWord(){
  const word = "SYSONE";
  const el = document.getElementById('loading-word');
  el.innerHTML = word.split('').map((c,i)=>`<span style="animation-delay:${i*70}ms">${c}</span>`).join('');
}

// ---------------------------------------------------------------
// 16. INIT
// ---------------------------------------------------------------
(function init(){
  animateLoadingWord();
  applyBrandMarks();
  document.getElementById('loading-sub').textContent = t('loadingSub');
  loadData(() => {
    initMap();
    setLang(currentLang);
    setupResponsiveToolbar();
    bumpVisits();

    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
      document.getElementById('app').classList.add('ready');
    }, 1400);
  });
})();
</script>
